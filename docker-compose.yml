version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: riskstack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: riskstack
      POSTGRES_USER: riskstack
      POSTGRES_PASSWORD: riskstack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskstack -d riskstack"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: riskstack-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://riskstack:riskstack@db:5432/riskstack
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: riskstack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
